name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: black --check openevals/ tests/
      - run: isort --check-only openevals/ tests/
      - run: flake8 openevals/ tests/ --max-line-length=120 --extend-ignore=E203,W503,E501
      - run: mypy openevals/ --ignore-missing-imports --no-strict-optional

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openevals
          POSTGRES_PASSWORD: password
          POSTGRES_DB: openevals
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://openevals:password@localhost:5432/openevals
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: testing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ tests/integration/ --cov=openevals --cov-report=xml --cov-report=term-missing --cov-fail-under=45 -v
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
