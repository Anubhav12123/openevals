name: CD — Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  docker:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: openevals:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
