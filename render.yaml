services:
  - type: web
    name: openevals
    env: python
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn openevals.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
