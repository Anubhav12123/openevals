<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>PromptGuard</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

  <div class="top">
    <div class="top-left">
      <div>
        <div class="app-name">OpenEvals</div>
        <div class="app-sub">AI Hallucination Monitor</div>
      </div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle-enabled" checked/>
      <span class="slider"></span>
    </label>
  </div>

  <div class="divider"></div>

  <div class="stat-row">
    <span class="stat-label">Responses Evaluated</span>
    <span class="stat-val" id="stat-total">0</span>
  </div>
  <div class="divider"></div>
  <div class="stat-row">
    <span class="stat-label">High Risk Caught</span>
    <span class="stat-val danger" id="stat-high">0</span>
  </div>
  <div class="divider"></div>
  <div class="stat-row">
    <span class="stat-label">Avg Risk Score</span>
    <span class="stat-val" id="stat-avg">—</span>
  </div>
  <div class="divider"></div>
  <div class="stat-row">
    <span class="stat-label">Session Protection</span>
    <span class="stat-val safe" id="stat-safe">—</span>
  </div>

  <div class="divider"></div>

  <div class="footer-link" id="history-toggle">View recent activity ›</div>

  <div class="history hidden" id="history">
    <div class="empty-msg">No activity yet. Ask something on ChatGPT, Claude, or Gemini.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
